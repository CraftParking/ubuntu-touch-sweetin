description "hold packages that break boot if upgraded/reconfigured (see apt-dpkg-fix notes)"

# apt-mark hold on an already-held package is a no-op, safe to run every boot.
# root is ro at this point in boot, dpkg needs to write its status file, so
# flip it rw just for this and back to ro right after - same as any other
# fix in this build that touches /etc or dpkg state.
start on filesystem

task

script
    mount -o remount,rw /
